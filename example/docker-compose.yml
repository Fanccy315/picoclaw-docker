services:
  gateway:
    image: picoclaw
    container_name: picoclaw-gateway
    restart: unless-stopped
    volumes:
      - ./workspace:/root/.picoclaw/workspace
      - ./config.json:/root/.picoclaw/config.json:ro
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      # NPM cache for faster MCP server installs
      - picoclaw-npm-cache:/root/.npm
    network_mode: host

  cli:
    image: picoclaw
    container_name: picoclaw-cli
    volumes:
      - ./workspace:/root/.picoclaw/workspace
      - ./config.json:/root/.picoclaw/config.json:ro
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - picoclaw-npm-cache:/root/.npm
    network_mode: host
    stdin_open: true
    tty: true
    entrypoint: ["/bin/bash"]

volumes:
  picoclaw-npm-cache: # Cache npm packages to speed up MCP server installations
